body:
  text: 華山隆昌寺司律學沙門讀體輯集梵語沙彌尼此翻息慈女謂息惡行慈息世染而慈濟眾生也亦云勤䇿女亦云求寂女律儀者十戒律諸威儀也上篇戒律門沙彌尼離戒文中佛言十六以上應作沙彌尼素無瑕穢貞良完具無所毀辱父母見聽乃得為道素不貞良不應為道石人𧏾病不應為道以女人姿態難保悅在須臾復生惡意譬如水泡一起一滅無有常定須善觀察乃可度尼又佛觀見人間上至二十八天下至十八地獄皆苦無樂故結戒以訓後生由是信女剃髮出家先受十支禁戒名法同沙彌尼次與二歲驗學六法為式叉摩那俟歲滿學淨堪入亞僧數者在二部僧中乞受比丘尼戒斯誠正制比來尼律失宗時風下邁而沙彌尼本所受戒未諳憍慢者多輕二部大僧愚昧者全失諸門細行欲光道化以攝尼徒難可冀也因采十戒略明制止俾蒙學知所向方好心出家者切意遵行慎勿違犯然近為式叉摩那比丘尼戒之階梯遠為菩薩戒之根本因戒生定因定發慧庶幾成就聖道不負初念出家之志矣若樂廣覽者自當詳閱律藏全典以下十戒條章依律藏隨字函本文錄出并無增減第一殺戒沙彌尼初戒不得殺生慈愍羣生如父母念子加哀蠕動猶如赤子何謂不殺護身口意身不殺人物蚑行喘息之類而不手為亦不教人見殺不食聞殺不食疑殺不食為我殺不食口不說言當殺當害報怨亦不得言死快殺快某肥某瘦某肉多好某肉少也意亦不念當有所賊殺於某快乎某畜肥某瘦哀諸眾生如己骨髓如父如母如子如身等無差特普等一心常志大乘是為沙彌尼始學戒也第二盜戒沙彌尼戒不得盜竊一錢以上草葉毛米不得取也主不手與不得取口不言取心不念取目不愛色耳不愛聲鼻不盜香舌不偷味身不貪衣心不竊欲六情無著常立權慧則曰不盜是為沙彌尼戒也第三婬戒沙彌尼戒不得婬妷何謂不婬真一清淨潔身不婬妷口不說婬心不念婬執己鮮明如虗空風無所倚著身不行婬目不婬視耳不婬聽鼻不婬香口不婬言心不存欲觀身四大本無所有計地水火風無我無人無壽無命何所婬妷何所著乎志空無相願是為沙彌尼戒也第四妄語戒沙彌尼戒不得兩舌惡言言語安詳不見莫言見不聞莫言聞見惡不傳聞惡不宣惡言直避常行四等無有非言言輒說道不得論說俗事不講王者臣吏賊事常歎經法菩薩正戒志於大乘不為小學行四等心是為沙彌尼戒也直避別本均作真譬今依高麗古本改正第五不飲酒戒沙彌尼戒不得飲酒不得嗜酒不得嘗酒酒有三十六失失道破家危身喪命皆悉由之牽東引西持南著北不能諷經不敬三尊輕易師友不孝父母心閉意塞世世愚癡不值大道其心無識故不飲酒欲離五陰五欲六葢得五神通得度五道是為沙彌尼戒也第六不著香花瓔珞戒沙彌尼戒不得持香花自熏飾衣被履屨不得五色不得以眾寶自瓔珞不得著錦繡綾羅綺縠不得綺視當著麤服青黑木蘭及泥洹裏衣低頭而行欲除六衰以戒為香求誦深法以為真實三十二相以為瓔珞得植眾好以為被服願六神通無礙六度導人是為沙彌尼戒也第七不坐高廣大牀戒沙彌尼戒不得坐金銀高牀綺繡錦被眾寶綩綖不得念之不得教求索好牀榻席五色畫扇上好捎拂不得著臂訓指鐶真信戒慚愧施博聞智慧一心精專常求三昧以為牀榻心不動搖眾慧自然以為坐具七覺不轉志於道心是為沙彌尼戒也第八不歌舞音樂戒沙彌尼戒不得聽歌舞音樂聲拍手鼓節不得自為亦不教人常自修身順行正法不為邪行一心歸佛誦經行正以為法樂不為俗樂聽經思惟深入大義自不有疾不得乘車馬象當念輕舉入不思議神通之達以為車乘度脫八難是為沙彌尼戒也第九不捉持金寶戒沙彌尼戒不得積聚珍寶不得手取不得教人常自專精以道為寶以經為上以義為妙解空無相無願為本至於三脫不求貪欲欲離九惱住道甚久無窮無極無有邊際亦無所住是為沙彌尼戒也第十不非時食戒沙彌尼戒食不失時常以時食不得失度過日中後不得復食雖有甘美無極之味終不復食亦不教人犯心亦不念假使無上自然食來亦不得食也若長者國王過日中後施亦不食終死不犯常思禪定一切飲食雖有所食裁自支命欲令一切解深遠願得十種力以為飲食是為沙彌尼戒也下篇威儀門佛制尼眾律嚴大僧由其正法係增減故詳考聖典其制自明若沙彌尼自不知應所施行不許近圓以大比丘尼事更難作故須令熟學知已乃許受具如不知而即為授具戒者則謂佛法易行亞僧易作是故沙彌尼應先崇訓以下條則於大愛道經沙彌尼離戒文及第二分比丘尼隨律威儀中節出又雲棲沙彌要略內凡沙彌尼可通用者亦采集之良以末法尼倫情多懈怠聞繁則厭並恐文字生淺由得刪繁撮要仍分類聚以便讀學間有未備從義補入一二其樂廣覧者自當檢閱全書敬三寶第一當敬佛至心無邪持頭腦著地常自懺悔宿世罪惡常敬法心存於道慈孝於經常敬僧心平不廢至誠有信不得因小事瞋捨三寶不得持佛像至大小便處不得著不淨履入佛殿及僧塔中始於出家受戒盡其終身壽命常當時刻繫憶三寶朝暮禮佛發願願在在生處具丈夫相童真出家即能親近三寶供養承事於近住女並檀越前應當讚歎三寶功德生增人信凡著一衣餐一食飲一漿常不忘佛恩著新衣履時先當禮佛受飲食時先當供佛恒存慚愧起知足念敬大沙門第二大沙門即比丘及比丘尼此總攝二部大僧不得喚二部大僧字不得盜聽二部大僧說戒不得轉行說二部大僧過不得見二部大僧過不起除讀經時病時剃髮時飯時作眾事時不得故作異語觸惱二部大僧不得無根瞋謗二部大僧不得於二部大僧中挑唆彼此不得故惱二部大僧假問經律不得罵詈二部大僧不得於二部大僧前行不得輕侮二部大僧故意於前戲笑傚其語言形相行步不得伺屏處見二部大僧過指背行時若逢二部大僧當下道低首旁立恭讓去已然後方行事師第三視和尚阿闍黎如視佛當敬於師常附近之如法律行當如師教常應和順常當早起勿後師次自警其心勿令師呼早起時當先清淨著法衣禮佛法却禮師欲入戶先當三彈指禮師時去六尺問訊却行出戶師坐禪不應作禮師經行不應作禮師受食師梳齒師澡浴師眠息等不應作禮欲禮拜若師止之宜順命勿拜師閉戶不應戶外作禮欲入戶作禮應彈指三徧師不應應去若使出不淨器不得唾不得瞋恚當誠信於師盡心給侍慈孝於師心存左右不去食息若行國中見怪異之事當啟語師問其變異從師受經當端心至實身心口意無差特如毛髮師設使行所至當疾去疾還設有人問沙彌尼汝師在不當默然直去不得共相應知設有過惡尋當向師首過言已無狀一切當信向於師若人說師過即當呵止持師飲食皆當兩手捧食畢斂器當徐徐侍師不得對面立不得高處立不得太遠立當令師小語得聞不費尊力若請問佛法當整衣禮拜合掌諦聽思惟深入若問家常事不須禮拜但端立師側據實申白師若身心倦叫去應去不得心情不喜見於顏色不得戲坐師座及臥師牀著師衣帽等師疾病始終料理房室被褥藥餌粥食等一一用心調治持衣授履洗染烘曬等具於律中茲不煩錄凡侍師不命之座不敢坐不問不敢對除自有事欲問凡侍立不得倚壁靠桌宜端身齊足側立師有所使令宜及時作辦不得違慢凡睡眠不得先師除有病緣白師允憩人問師名當云上某下某不得翹足叉腰安然於師前坐臥如命坐師起即應速起守護師物如己身命不得私自與人不得惡眼視師不得離師自住若師命終若師有緣遠行不得隨去應禮白本師應依止何人當如師命即依止住一切還同事師法無異若師不指示便命終須更擇良導依止而住若師破戒破見被僧如法如律治擯亦應別覓明師依止而住不得縱情自用不得依止比丘僧住不得與沙彌同住不得隨師住遊境花園不得隨師住神廟墳庵師若住當作禮如律諫勸夏安居時當隨師近大比丘界住不得於無比丘住處夏安居師或有所施當恭敬頂禮乃受若已有者當云有不可妄受隨師出行第四不得過歷人家不得止住道邊共人語不得左右顧視當低首平目隨師後到檀越家當住一面師教坐乃坐到他寺師禮佛或自禮不得擅自鳴磬師受齋當立出生齋畢復當侍立收䞋若緣往當與三人共行當與大尼共行若與優婆夷共行應著法衣行著衣當齊整不得反抄衣行不得衣纏頸行不得跳行不得手叉腰行不得搖身行不得掉臂行不得戲笑行隨師後行不得踐師形影道傍遇有花菓不得擅摘隨師遐邇往還不得怨聲言苦現疲勞相若道逢男子不得視憶當觀空作不淨想若路見俗奇之事不得失聲讚美入眾第五不得爭坐處不得於座上遙相呼語笑眾中有失儀當隱惡揚善不得伐勞顯己之功不得與大比丘大比丘尼共坐不得相形笑不得高聲鼻涕嘔吐不得佛塔四邊大小便使臭氣來入不得向佛塔大小便不得向佛塔舒脚坐喫茶湯時不得隻手作禮不得多言多笑及呵欠當以衣袖掩口供佛花取開圓者不得先嗅除萎者方供新者萎者不得棄地踐踏宜著屏處應為大比丘尼給楊枝澡水等隨力能為即當作之不得偷安當求勝福若聞呼時即念佛應之不得云有云是凡拾遺物當白主事比丘尼凡上佛殿當肅容儀不得放意自便不得惡口相調不得教人作不善語不得坐視大眾勞務避懶偷安不得私取招提竹木花菓蔬菜一切飲食及一切器物等凡自稱當舉二字法名不得云我及某甲不得因小事爭執若大事難忍者亦須心平氣和以理論辯不可則辭而去若動氣出麤即非沙彌尼入大僧堂先禮聖僧像次行十方禮若見式叉摩那及沙彌亦應作禮隨眾食第六聞楗椎聲即當整衣服臨食呪願皆當恭敬出生飯不過七粒不過一寸饅頭不過指甲許多則為貪少則為慳其餘蔬菜豆腐不出凡出生時默念偈云汝等鬼神眾我今施汝供此食徧十方一切鬼神共凡飲食作五觀想一計功多少量彼來處二忖己德行全缺應供三防心離過貪等為宗四正事良藥為療形枯五為成道故方受此食無呵食好惡不得以食私所與若摘與狗來益食不得言不用若已飽當以手讓却之不得爪頭使風屑落鄰鉢中不得含食語不得笑談雜話不得嚼食有聲如挑牙以袖掩口食中或有蟲螘宜密掩藏之莫令鄰單見生疑心當一坐食不得食訖離座更坐食不得食訖以手指刮碗鉢食凡食不得太速不得太遲行食未至不得生煩惱或有所需默然指授不得高聲大喚不得碗鉢作聲不得食畢先起若違僧制聞白椎不得抗拒不服飯中有穀去皮食之不得見美味生貪心恣口食不得偏眾食受食時左手持鉢右手扶緣食未畢不得先起須俟結齋同眾而起午後不得妄憶其食當止貪念謹遵法律寧死不食不得自畜宿食不得為他人畜宿食不得教餘沙彌尼非時食禮拜第七禮拜不得占殿中央是住持位有人禮佛不得向彼人頭前徑過凡合掌不得十指參差不得中虗不得將指插鼻中須平胸高低得所不得非時禮拜如欲非時禮須待人靜時師禮佛不得與師並禮當隨後遠拜師拜人不得與師同拜在師前不得與同類相禮在師前不得受人禮己手持經像不得為人作禮凡禮拜須精誠作觀教列七種不可不知粥飯後齒木清淨方行禮敬不應著褻衣禮他人亦不得著褻衣受檀越禮當恒著縵條袈裟詣俗省親不得作禮俗親眷屬唯至誠合掌問訊習學經典第八宜先學沙彌尼十戒諸威儀後學脩多羅不得違越凡學經先須白師經完更白師學某經不得汙手持經卷不得口吹經上塵不得案上狼籍卷帙不得經案上包藏茶末雜物對經典如對佛不得借人經看不還及不加愛重以致損壞不得笑經語凡讀經律時先禮經律三拜方雙手請卷於案將開卷先必合掌誦開經偈掩卷已仍請供佛像前作禮三拜乃却讀經律案應淨潔焚爐香不得沙彌尼律儀放大乘經上不得以帽置經律卷上不得二人戲笑讀經律讀經不得撫案曲身翹足累踝不得高聲動眾不得臥讀出聲聽法第九當整理衣服平視直進坐必端嚴不得亂語不得咳唾凡聽法須聞而思思而修不得專記名言以資談柄不得未會稱會入耳出口至說法處先禮座三拜方坐聽竟起身仍禮三拜旁立候說者下座方回本所不得來去無禮坐久生厭入寺院第十凡入寺門不得行中央須緣左右邊行緣左先左足緣右先右足不得無故登大殿遊行不得無故登塔入殿塔當右遶不得左轉不得殿塔中涕唾遶塔或三匝七匝乃至十百須知徧數不得以笠杖等倚殿壁不得著木屐及不淨履入殿塔中不得於佛殿中形相佛像不得殿塔中舒脚坐不得上塔向窗牗觀望入禪堂隨眾第十一不得高聲大語輕手揭簾須垂後手不得拖鞋作聲不得大咳嗽作聲凡洗面不得多使水漱口吐水須低頭引水下不得噴水濺人不得二衣苟簡不得多作衣服若有餘當捨不得著類俗家婦女衣飾等不得以白帶束腰不得不淨手搭衣不得將佛燈私就己用然燈當以密覆勿令飛蟲投入不得閑走不得與人結拜親友不得於僻處裸形自弄身體不得照鏡摩𢪛面目畫眉上單下單俱當細行勿令鄰單動念不得單上縫補衣被執作第十二當惜眾僧物當隨知事者教令不得違戾凡洗菜當三易水凡汲水先淨手凡用水須諦視有蟲無蟲若有蟲以密羅濾過方用若嚴冬不得早濾水須待日出凡燒竈不得然腐薪凡作食不得帶爪甲垢凡棄惡水不得當道不得高手揚潑當離地四五寸徐徐棄之凡掃地不得迎風掃不得聚灰土安門扇後洗內衣先須拾去蟣蝨夏月用水盆了須覆令乾若仰即蟲生不得熱湯潑地上入浴第十三不得與優婆夷共洗不得與婢使共洗不得與小兒共洗先以湯洗面從上至下徐徐洗之不得麤躁以湯水濺他人不得浴堂小遺不得自視形體隱處不得共人語笑凡有瘡癬宜在後浴或有可畏者尤宜迴避不得恣意久洗妨礙後人脫衣著衣安詳自在湯冷熱依例擊梆不得大喚入廁第十四欲大小便即行莫待內逼倉卒竹竿上挂直裰摺令齊整以手巾或腰絛繫之一作記認二防墮地須脫換鞋履不得淨履入廁不得與人共廁不得上男子廁上至當彈指或謦咳使內人知不得迫促內人使出已上復當彈指作聲令廁中非人知不得低頭視下不得持草畫地不得努氣作聲不得隔壁共人語不得唾壁便畢當先洗淨次洗手未洗手不得持物未洗淨洗手逢人不得作禮宜側身避之不得沿路行繫衣帶眠臥第十五凡處睡不在人前起不在人後不得與大比丘尼同室宿不得與同事沙彌尼及式叉摩那共榻設無異榻不得共被設無異被須各著襯身衣不得入佛塔中止宿除為守護當頭輸佛當傴臥不得伸脚不得仰向頻伸不得裸倮自露不得手近不淨處凡挂鞋襪小衣等不得過人頭面不得共鄰單說話動眾善見律云臨欲睡時應先念佛念法念僧念戒念天念無常於六念中隨一一念圍爐第十六不得交頭接耳說話不得彈垢膩火中不得烘焙鞋襪不得向火太久妨後人稍煖便宜歸位在房中住第十七更相問訊須知大小四分律云沙彌以生年為次第若生年等者以出家年月為次第謙和為高尚其沙彌尼亦爾欲持燈火入預告房內知云火入欲滅燈火預問同房人更用燈否不得口吹燈火應徐却炷令熄滅燈後不得高聲念誦若有病人當慈心始終看之有人睡不得打物作響及高聲語笑不得無故入他房院不得咳唾室中淨地及四壁不得與伴戲論說世間不急之事止檀越家第十八有異座當坐不宜雜坐不得左右顧視不得與婢共私語人問經當知時慎勿為非時之說若與男子說法不得低聲密語不得多語不得誑說佛法亂答他問自賣多聞求彼恭敬不得詐現威儀假糚禪相主人設食雖非法會亦勿失儀軌不得至竈下坐食不得雜坐酒席不得空室內或屏處與男子共坐共語不得書疏往來及假借等不得送盒禮傚白衣往還不得結拜白衣人作父母姊妹兄弟不得管人家務不得說僧中過若詣俗省親當先入堂中禮佛或家堂聖像前端莊問訊次父母眷屬等一一問訊不得向父母說師法嚴出家難寂寥淡泊艱辛苦屈等事宜為說佛法令生信增福不得與親族小兒等久坐久立雜話語笑不得與優婆夷相看形體大笑不得獨至舍後無犯夜行若天晚作宿當獨處一榻多坐少臥一心念佛事訖即還不得留連乞食第十九當與老成人俱若無人俱當知所可行處到人門戶宜審舉措不得失威儀家無女人不可入門若欲坐先當瞻視座席有刀兵不宜坐有寶物不宜坐欲說經當知所應說時不應說時不得說與我食令爾得福不得哀求苦索不得廣談因果望彼多施不得專向熟情施主家及熟情庵院處索食入聚落第二十有三寶事及看病等切緣方入無切緣不得入即入亦覓如法者伴不得馳行不得搖臂行不得旁視人物行宜端身平目直視而行不得共小年談笑行不得與男人前後互行不得與男僧前後互行不得與醉人狂人前後互行或逢尊宿親識俱立下旁先意問訊或逢戲幻奇怪等事俱不宜看或遇官府不論大小俱宜迴避或遇鬬諍者亦遠避之不得住看凡遇水坑水缺不得跳越有路當遶行無路眾皆跳越則得不得回寺誇張所見奇事市物第二十一勿爭貴賤若為人所犯方便避之勿從求直已許甲物雖復更賤勿捨彼取此令主有恨慎勿保任致愆負凡所施行不得自用第二十二出入行來當先白師作新法衣當先白師著新法衣當先白師剃頭當先白師疾病服藥當先白師作眾僧事當先白師欲有私具紙筆之類當先白師若諷經起當先白師若人以物惠己當先白師師許受方受己欲以物惠人當先白師師聽方送人從己借物當先白師師聽方與己欲借人物當先白師師聽方借白師聽不聽皆當作禮不聽不得有恨意不得立門望視及以指插口中說戒法儀每至黑白月十五日清晨知事稟白堂頭今日誦戒和尚令侍者命書記書簡輪請闍黎知事送簡入闍黎寮問訊出命直日者在比丘堂前擊鐘或擊鼓三下集諸比丘依戒次列定輪差二比丘一人執香一人執磬入闍黎寮迎闍黎陞座迎請率諸比丘禮三拜闍黎係是菩薩尊臘不必謝眾若是比丘便當謝眾如菩薩戒本前後同迎請侍座坐舉讚禪宗正法非戒無防堅持潔白保心王識相行溫良儀表堂堂利濟戒生香香雲葢菩薩摩訶薩稽首禮諸佛引請擊魚同闍黎梵舉戒序并問清淨法闍黎鳴尺白比丘戒相梵舉逐句同誦誦畢引請送闍黎歸寮諸比丘入和尚方丈禮拜音釋𧏾女力切音匿蟲食病態他代切音貸態度也諳烏含切音庵知也熟聞也蠕音輭同蝡蟲行貌蚑音祇髓悉委切骨中脂也蛈音逸輒音徹每事即然也嗜常利切音視嗜欲喜之也縠胡谷切音斛輕紗細縛也綩委遠切音宛纁色衣綖以然切冕前後垂覆捎所交切音筲拂敷勿切音髴拂去塵埃也釧尺絹切臂環也鐶戶關切音還唆桑何切音梭唾湯臥切口液也褥如欲切音辱坐褥也餌音耳食也䞋初親切音襟䞋錢也摘陟草切音謫手取也楗巨偃切音鍵限門也椎直追切音追擊也慳丘閑切悋也莫見切音麥末也饅謨官切音瞞麪食也療力弔切音料療治也嚼才爵切齧也螘語綺切與蟻同踝戶瓦切音跨足踝也濺音贊汙洒也陟教切籠也裸耶果切赤體也濾音慮蟣音幾蝨子也蝨音瑟齧人蟲也瘡初莊切音倉瘡痍也癬息淺切音鮮乾瘍也裰丁括切音掇補裰破衣也摺質涉切摺疊也絛音韜纓飾也襯初親切音襯近身衣也倮魯果切赤體也襪勿發切音韈足衣也糚音莊粉飾也
